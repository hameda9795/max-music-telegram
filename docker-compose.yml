version: "3.9"

services:
  music-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - downloads:/app/downloads
      - sessions:/app/sessions
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  downloads:
  sessions:
